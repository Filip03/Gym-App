<div class="wrapper">
  <div class="auth-container">
    <div class="holder">
      <h2>Login</h2>
      <img class="j" src="assets/j.jpg">
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="email">
        <label for="username">Korisničko ime</label>
        <input id="username" name="username" type="text" [(ngModel)]="username" required />
      </div>

      <div class="password">
        <label for="password">Lozinka</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" required />
      </div>

      <button class="btn" type="submit" [disabled]="!loginForm.valid">
        {{ loading ? 'Prijavljivanje...' : 'Uloguj se' }}
      </button>
    </form>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <a class="registration" routerLink="/register">
      Postani član <span class="jeba">Jebe</span>  
    </a>
  </div>
</div>
